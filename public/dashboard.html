<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FormFlow</title>
</head>

<body class="h-screen text-white overflow-hidden" id="app_body">

<div class="fixed inset-0" id="bg_overlay"></div>

<div class="relative h-screen flex">

    <!-- Sidebar -->
    <aside class="w-96 p-7 backdrop-blur-xl bg-white/5 border-r border-white/10 flex flex-col flex-shrink-0">
        <h2 class="text-2xl font-bold text-emerald-400 mb-10 cursor-pointer"
            onclick="setActive(this); loadUser()">FormFlow</h2>
        <nav class="space-y-4">
            <button onclick="setActive(this); goCreateForm()" class="nav-btn">
                <i class="fa-solid fa-plus"></i> New Form
            </button>
            <button onclick="setActive(this); goMyForms()" class="nav-btn">
                <i class="fa-solid fa-file"></i> My Forms
            </button>
            <button onclick="setActive(this); goMyResponses()" class="nav-btn">
                <i class="fa-solid fa-chart-bar"></i> My Responses
            </button>
            <button onclick="setActive(this); goFillForm()" class="nav-btn">
                <i class="fa-solid fa-pen-to-square"></i> Fill Form
            </button>
            <button id="nav_audit_btn" onclick="setActive(this); goAuditLogs()" class="nav-btn mt-12 border border-dashed border-white/20 hidden">
                <i class="fa-solid fa-terminal"></i> Audit Logs
            </button>
        </nav>

        <div class="mt-auto">

            <!-- Theme Picker Dropdown -->
            <div class="relative mb-4" id="theme_picker_wrap">
                <div id="theme_panel"></div>
                <button id="theme_dropdown_btn" onclick="toggleThemePanel()">
                    <div class="swatch-preview" id="btn_swatch_preview"></div>
                    <span id="btn_theme_label">Midnight</span>
                    <i class="fa-solid fa-chevron-up ml-auto text-[10px] opacity-50"></i>
                </button>
            </div>

            <!-- User + Logout -->
            <div class="border-t border-white/10 pt-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-white truncate max-w-[120px]" id="sidebar_user_name">Loading...</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-0.5">FormFlow v1.0</p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="openChangePassword()" class="w-10 h-10 rounded-full hover:bg-white/5 text-gray-400 hover:text-emerald-400 transition flex items-center justify-center group" title="Change Password">
                        <i class="fa-solid fa-key group-hover:scale-110 transition-transform"></i>
                    </button>
                    <button onclick="confirmLogout()" class="w-10 h-10 rounded-full hover:bg-white/5 text-gray-400 hover:text-red-400 transition flex items-center justify-center group" title="Sign Out">
                        <i class="fa-solid fa-power-off group-hover:scale-110 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- More margin (p-10) to expose dark bg around glass -->
    <main class="flex-1 p-8 overflow-y-auto flex flex-col" id="work_area_outer">
        <div id="work_area" class="glass-bg flex-1 p-10"></div>
    </main>

</div>

<style>

.nav-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 1rem;
    background: rgba(255,255,255,.06);
    display: flex;
    gap: 12px;
    align-items: center;
    transition: .25s ease;
}
.nav-btn:hover  { background: rgba(16,185,129,.25); padding-left: 1.375rem; }
.nav-btn.active { background: rgba(16,185,129,.35); padding-left: 1.375rem; }
.nav-btn.hidden { display: none !important; }
.nav-btn i { width: 1.1rem; text-align: center; flex-shrink: 0; }

.quick-btn {
    background: linear-gradient(135deg, #10b981, #059669);
    padding: .85rem 2rem;
    border-radius: 9999px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    color: #fff;
    transition: .2s ease;
}
.quick-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,.4); }
.quick-btn.secondary {
    background: transparent;
    border: 1.5px solid #34d399;
    color: #34d399;
}
.quick-btn.secondary:hover { background: rgba(16,185,129,.1); box-shadow: none; }

/* The glass background card */
.glass-bg {
    position: relative;
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(18px);
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    overflow: hidden;
}
.glass-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.12) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    opacity: .4;
    pointer-events: none;
}
.glass-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(16,185,129,.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(6,182,212,.12), transparent 40%);
    pointer-events: none;
}

/* Compact inner card for fill form / centered content */
.content-card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 1.5rem;
    padding: 2.5rem;
    width: 100%;
    max-width: 750px;
}

.stat-card {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 1.25rem;
    padding: 1.5rem;
    flex: 1;
    transition: border-color .2s, transform .2s;
}
.stat-card:hover { border-color: rgba(52,211,153,.3); transform: translateY(-2px); }

input[type="datetime-local"] {
    background: #1f2937;
    border: 1px solid #374151;
    color-scheme: dark;
}


/* ── Drag & drop ── */
[draggable="true"] { cursor: grab; }
[draggable="true"]:active { cursor: grabbing; }
.drag-ghost { opacity: .35; transform: scale(.98); transition: none; }
.drag-over-top    { box-shadow: 0 -3px 0 0 rgba(16,185,129,.7) !important; }
.drag-over-bottom { box-shadow: 0  3px 0 0 rgba(16,185,129,.7) !important; }

/* ── Theme Dropdown ── */
#theme_dropdown_btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: .6rem .9rem;
    border-radius: .75rem;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    color: #d1d5db;
    font-size: .8rem;
    cursor: pointer;
    transition: background .2s;
}
#theme_dropdown_btn:hover { background: rgba(255,255,255,.1); }
#theme_dropdown_btn .swatch-preview {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,.2);
}

#theme_panel {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0; right: 0;
    background: rgba(15,15,25,.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 1rem;
    padding: .5rem;
    display: none;
    flex-direction: column;
    gap: 2px;
    z-index: 999;
    box-shadow: 0 -12px 40px rgba(0,0,0,.6);
}
#theme_panel.open { display: flex; }

.theme-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: .55rem .75rem;
    border-radius: .65rem;
    cursor: pointer;
    transition: background .18s;
    border: 1px solid transparent;
}
.theme-row:hover { background: rgba(255,255,255,.07); }
.theme-row.active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.12); }
.theme-row .t-swatch {
    width: 28px; height: 28px;
    border-radius: .4rem;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,.15);
}
.theme-row .t-label { flex: 1; font-size: .82rem; color: #e5e7eb; }
.theme-row .t-check { color: #34d399; font-size: .7rem; opacity: 0; }
.theme-row.active .t-check { opacity: 1; }

</style>

<script>

/* ── THEME ENGINE ─────────────────────────────────────────── */
const THEMES = [
    {
        id: 'midnight',
        label: 'Midnight',
        swatch: 'linear-gradient(135deg,#020617,#031b1a)',
        body: '#020617',
        overlay: 'radial-gradient(ellipse at top left, #031b1a 0%, #020617 60%, #020617 100%)'
    },
    {
        id: 'cosmos',
        label: 'Cosmos',
        swatch: 'linear-gradient(135deg,#0d0221,#1a0533)',
        body: '#08011a',
        overlay: 'radial-gradient(ellipse at top left, #1a0533 0%, #08011a 55%, #0a0120 100%)'
    },
    {
        id: 'abyss',
        label: 'Abyss',
        swatch: 'linear-gradient(135deg,#010d1f,#011b3a)',
        body: '#010d1f',
        overlay: 'radial-gradient(ellipse at top left, #011b3a 0%, #010d1f 55%, #010816 100%)'
    },
    {
        id: 'forest',
        label: 'Forest',
        swatch: 'linear-gradient(135deg,#010f07,#012a10)',
        body: '#010f07',
        overlay: 'radial-gradient(ellipse at top left, #012a10 0%, #010f07 55%, #011208 100%)'
    },
    {
        id: 'crimson',
        label: 'Crimson',
        swatch: 'linear-gradient(135deg,#150204,#2d0409)',
        body: '#150204',
        overlay: 'radial-gradient(ellipse at top left, #2d0409 0%, #150204 55%, #1a0305 100%)'
    },
    {
        id: 'ember',
        label: 'Ember',
        swatch: 'linear-gradient(135deg,#130900,#2e1600)',
        body: '#130900',
        overlay: 'radial-gradient(ellipse at top left, #2e1600 0%, #130900 55%, #1a0d00 100%)'
    }
];

function applyTheme(themeId, closePanel = true) {
    const t = THEMES.find(x => x.id === themeId) || THEMES[0];
    document.getElementById('app_body').style.background = t.body;
    document.getElementById('bg_overlay').style.background = t.overlay;
    localStorage.setItem('ff_theme', t.id);

    // Update button preview
    document.getElementById('btn_swatch_preview').style.background = t.swatch;
    document.getElementById('btn_theme_label').textContent = t.label;

    // Update rows
    document.querySelectorAll('.theme-row').forEach(r => {
        r.classList.toggle('active', r.dataset.theme === t.id);
    });

    if (closePanel) closeThemePanel();
}

function toggleThemePanel() {
    const panel = document.getElementById('theme_panel');
    panel.classList.toggle('open');
}

function closeThemePanel() {
    document.getElementById('theme_panel').classList.remove('open');
}

// Click outside to close
document.addEventListener('click', e => {
    const wrap = document.getElementById('theme_picker_wrap');
    if (wrap && !wrap.contains(e.target)) closeThemePanel();
});

function renderThemeSwatches() {
    const panel = document.getElementById('theme_panel');
    panel.innerHTML = THEMES.map(t => `
        <div class="theme-row" data-theme="${t.id}" onclick="applyTheme('${t.id}')">
            <div class="t-swatch" style="background:${t.swatch}"></div>
            <span class="t-label">${t.label}</span>
            <i class="fa-solid fa-check t-check"></i>
        </div>
    `).join('');
    // Apply saved or default (don't close panel since it's not open yet)
    applyTheme(localStorage.getItem('ff_theme') || 'midnight', false);
}
/* ─────────────────────────────────────────────────────────── */


const params = new URLSearchParams(location.search);
const userId = params.get("user_id");

// Guard: if no user_id, kick back to sign-in and remove this page from history
if (!userId) { location.replace("signin.html"); }
const work_area = document.getElementById("work_area");

function setActive(btn) {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    if (btn.classList.contains("nav-btn")) btn.classList.add("active");
}

/* HOME — centered, welcome card + stats same width */
async function loadUser() {
    work_area.className = "glass-bg flex-1 p-6 flex items-center justify-center";

    work_area.innerHTML = `
        <div class="relative z-10 flex flex-col gap-5" style="width: 680px;">

            <!-- Welcome card -->
            <div class="content-card" style="max-width:100%;">
                <h1 id="username"
                    class="text-5xl font-bold leading-tight bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-400 bg-clip-text text-transparent mb-3">
                    Welcome, there
                </h1>
                <p class="text-gray-300 text-base mb-6">
                    Create forms, collect responses, and gain insights — all in one place.
                </p>
                <div class="flex gap-3">
                    <button onclick="goCreateForm()" class="quick-btn">Create Form</button>
                    <button onclick="goFillForm()" class="quick-btn secondary">Fill Form</button>
                </div>
            </div>

            <!-- Stat cards — same width as welcome card -->
            <div class="flex gap-4">
                <div class="stat-card">
                    <p class="text-gray-400 text-sm">Total Forms</p>
                    <h2 id="stat-forms" class="text-3xl font-bold mt-1">--</h2>
                </div>
                <div class="stat-card">
                    <p class="text-gray-400 text-sm">Responses</p>
                    <h2 id="stat-responses" class="text-3xl font-bold mt-1">--</h2>
                </div>
                <div class="stat-card">
                    <p class="text-gray-400 text-sm">Active Forms</p>
                    <h2 id="stat-active" class="text-3xl font-bold mt-1">--</h2>
                </div>
            </div>

        </div>
    `;

    try {
        const res  = await fetch(`/auth/user/${userId}`);
        const data = await res.json();
        
        const displayName = data.NAME || "User";
        
        const usernameEl = document.getElementById("username");
        if (usernameEl) {
            usernameEl.innerText = `Welcome, ${displayName}`;
        }
        
        const sidebarNameEl = document.getElementById("sidebar_user_name");
        if (sidebarNameEl) {
            sidebarNameEl.innerText = displayName;
        }

        if (data.USER_TYPE && data.USER_TYPE.toLowerCase() === 'faculty') {
            document.getElementById("nav_audit_btn").classList.remove("hidden");
        }
    } catch {
        const sidebarNameEl = document.getElementById("sidebar_user_name");
        if (sidebarNameEl) sidebarNameEl.innerText = "User";
    }

    try {
        const [formsRes, responsesRes] = await Promise.all([
            fetch(`/forms/myforms?user_id=${userId}`),
            fetch(`/responses/my/${userId}`)
        ]);
        const formsData     = await formsRes.json();
        const responsesData = await responsesRes.json();
        if (Array.isArray(formsData)) {
            document.getElementById("stat-forms").innerText  = formsData.length;
            document.getElementById("stat-active").innerText = formsData.filter(f => f.STATUS === "open").length;
        }
        if (Array.isArray(responsesData)) {
            document.getElementById("stat-responses").innerText = responsesData.length;
        }
    } catch {
        ["stat-forms","stat-active","stat-responses"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerText = "0";
        });
    }
}

function confirmLogout() {
    document.getElementById('logout_modal').classList.remove('hidden');
    // small delay so the transition fires
    requestAnimationFrame(() =>
        document.getElementById('logout_modal_card').classList.remove('scale-95', 'opacity-0')
    );
}

function closeLogoutModal() {
    const card = document.getElementById('logout_modal_card');
    card.classList.add('scale-95', 'opacity-0');
    setTimeout(() => document.getElementById('logout_modal').classList.add('hidden'), 200);
}

function logout() {
    // replace() removes the dashboard from browser history,
    // so the back button can't return to it after sign-out.
    location.replace("signin.html");
}

function openChangePassword() {
    document.getElementById('cp_current').value = '';
    document.getElementById('cp_new').value = '';
    document.getElementById('cp_confirm').value = '';
    document.getElementById('cp_error').classList.add('hidden');
    document.getElementById('cp_success').classList.add('hidden');
    document.getElementById('change_pw_modal').classList.remove('hidden');
    requestAnimationFrame(() =>
        document.getElementById('change_pw_card').classList.remove('scale-95', 'opacity-0')
    );
}

function closeChangePassword() {
    const card = document.getElementById('change_pw_card');
    card.classList.add('scale-95', 'opacity-0');
    setTimeout(() => document.getElementById('change_pw_modal').classList.add('hidden'), 200);
}

async function submitChangePassword() {
    const current  = document.getElementById('cp_current').value.trim();
    const newPw    = document.getElementById('cp_new').value.trim();
    const confirm  = document.getElementById('cp_confirm').value.trim();
    const errEl    = document.getElementById('cp_error');
    const okEl     = document.getElementById('cp_success');
    const btn      = document.getElementById('cp_submit_btn');

    errEl.classList.add('hidden');
    okEl.classList.add('hidden');

    if (!current || !newPw || !confirm) {
        errEl.textContent = 'All fields are required.'; errEl.classList.remove('hidden'); return;
    }
    if (newPw.length < 6) {
        errEl.textContent = 'New password must be at least 6 characters.'; errEl.classList.remove('hidden'); return;
    }
    if (newPw !== confirm) {
        errEl.textContent = 'New passwords do not match.'; errEl.classList.remove('hidden'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> Saving...';

    try {
        const res  = await fetch('/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, current_password: current, new_password: newPw })
        });
        const data = await res.json();

        if (res.ok) {
            okEl.textContent = '✓ Password updated successfully!';
            okEl.classList.remove('hidden');
            document.getElementById('cp_current').value = '';
            document.getElementById('cp_new').value = '';
            document.getElementById('cp_confirm').value = '';
            setTimeout(() => closeChangePassword(), 1800);
        } else {
            errEl.textContent = data.message || 'Something went wrong.';
            errEl.classList.remove('hidden');
        }
    } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check mr-1.5"></i> Update Password';
    }
}

/* MY RESPONSES */
async function goMyResponses() {
    work_area.className = "glass-bg flex-1 p-12 flex flex-col m-8 !overflow-y-auto";
    work_area.innerHTML = `
        <div class="relative z-10 grid grid-cols-5 gap-6 flex-1">
            <div class="col-span-3 overflow-y-auto px-4">
                <h2 class="text-2xl font-bold text-emerald-400 mb-4">My Responses</h2>
                <div id="my_responses_list" class="space-y-3">
                    <p class="text-gray-400">Loading...</p>
                </div>
            </div>
            <div class="col-span-2 overflow-y-auto px-4">
                <h2 class="text-2xl font-bold text-emerald-400 mb-4">&nbsp;</h2>
                <div id="my_response_detail" class="text-gray-400">Select a form to view your response</div>
            </div>
        </div>
    `;

    try {
        const res  = await fetch(`/responses/my/${userId}`);
        const data = await res.json();
        const container = document.getElementById("my_responses_list");
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = `<p class="text-gray-400">No responses submitted yet.</p>`;
            return;
        }
        const byForm = {};
        data.forEach(r => {
            if (!byForm[r.FORM_ID]) byForm[r.FORM_ID] = {
                title: r.TITLE || `Form #${r.FORM_ID}`,
                responseId: r.RESPONSE_ID,
                submittedAt: r.SUBMITTED_AT,
                formId: r.FORM_ID,
                reportReleased: r.REPORT_RELEASED
            };
        });
        container.innerHTML = Object.values(byForm).map(f => `
            <div onclick="viewMyResponse(${f.responseId})"
                class="p-4 rounded-xl border cursor-pointer transition bg-white/5 border-white/10 hover:bg-white/10 flex justify-between items-center">
                <div>
                    <p class="text-white font-semibold">${f.title}</p>
                    <p class="text-gray-400 text-xs mt-1">Submitted: ${new Date(f.submittedAt).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}</p>
                </div>
                ${f.reportReleased === 'yes' ? `
                    <button onclick="event.stopPropagation(); viewPublicReport(${f.formId}, ${f.responseId})" 
                        class="text-xs px-3 py-1.5 rounded-xl bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/30 font-medium">
                        View Public Report
                    </button>
                ` : ''}
            </div>
        `).join("");
    } catch {
        document.getElementById("my_responses_list").innerHTML = `<p class="text-red-400">Failed to load responses.</p>`;
    }
}

async function viewPublicReport(formId, responseId) {
    const detail = document.getElementById("my_response_detail");
    detail.innerHTML = `<p class="text-gray-400">Loading Report...</p>`;
    
    try {
        const res = await fetch(`/responses/report/${formId}?user_id=${userId}`);
        const data = await res.json();
        
        if (!res.ok) {
            detail.innerHTML = `<p class="text-red-400">${data.message}</p>`;
            return;
        }
        
        detail.innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Public Report Stats</h3>
                <button onclick="viewMyResponse(${responseId})" class="text-sm px-3 py-1 rounded-lg bg-white/5 border border-white/10 text-gray-300 hover:text-white hover:bg-white/10 transition">
                    Back to My Response
                </button>
            </div>
            <div id="public_report_render_area"></div>
        `;
        
        renderReport(data, "public_report_render_area");
    } catch {
        detail.innerHTML = `<p class="text-red-400">Failed to load public report.</p>`;
    }
}

async function viewMyResponse(responseId) {
    const detail = document.getElementById("my_response_detail");
    detail.innerHTML = `<p class="text-gray-400">Loading...</p>`;
    
    try {
        const res  = await fetch(`/responses/single/${responseId}`);
        const data = await res.json();
        
        if (!res.ok) { 
            detail.innerHTML = `<p class="text-red-400">${data.message || 'Error fetching response'}</p>`; 
            return; 
        }

        detail.innerHTML = `
            <div class="space-y-3">
                ${data.map(a => `
                    <div class="p-4 rounded-xl bg-white/5 border border-white/10">
                        <p class="text-gray-400 text-sm">${a.QUESTION_TEXT || "Question"}</p>
                        <p class="text-white mt-1">${a.ANSWER_TEXT ?? a.ANSWER_NUMBER ?? a.OPTION_TEXT ?? "-"}</p>
                    </div>
                `).join("")}
            </div>
        `;
    } catch (err) {
        console.error("Error loading response details:", err);
        detail.innerHTML = `<p class="text-red-400">Failed to load. Check browser console.</p>`;
    }
}

renderThemeSwatches();
loadUser();
</script>

<script src="newForm.js?v=4" defer></script>

<!-- Change Password Modal -->
<div id="change_pw_modal"
     class="hidden fixed inset-0 z-[9999] flex items-center justify-center"
     onclick="if(event.target===this) closeChangePassword()">

    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div id="change_pw_card"
         class="relative z-10 w-[420px] bg-gray-900/90 border border-white/10 rounded-2xl p-8
                shadow-[0_30px_80px_rgba(0,0,0,.7)]
                scale-95 opacity-0 transition-all duration-200 ease-out">

        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-full bg-emerald-500/15 flex items-center justify-center">
                <i class="fa-solid fa-key text-emerald-400 text-lg"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-white">Change Password</h3>
                <p class="text-gray-400 text-xs mt-0.5">Update your account password</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider mb-1.5 block">Current Password</label>
                <input id="cp_current" type="password" placeholder="Enter current password"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm
                           placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 transition" />
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider mb-1.5 block">New Password</label>
                <input id="cp_new" type="password" placeholder="At least 6 characters"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm
                           placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 transition" />
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider mb-1.5 block">Confirm New Password</label>
                <input id="cp_confirm" type="password" placeholder="Repeat new password"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm
                           placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 transition" />
            </div>
        </div>

        <p id="cp_error" class="text-red-400 text-xs mt-3 hidden"></p>
        <p id="cp_success" class="text-emerald-400 text-xs mt-3 hidden"></p>

        <div class="flex gap-3 mt-6">
            <button onclick="closeChangePassword()"
                class="flex-1 py-2.5 rounded-xl bg-white/6 border border-white/10
                       text-gray-300 hover:bg-white/10 transition text-sm font-medium">
                Cancel
            </button>
            <button id="cp_submit_btn" onclick="submitChangePassword()"
                class="flex-1 py-2.5 rounded-xl bg-emerald-500/20 border border-emerald-500/30
                       text-emerald-400 hover:bg-emerald-500/30 transition text-sm font-semibold">
                <i class="fa-solid fa-check mr-1.5"></i> Update Password
            </button>
        </div>
    </div>
</div>

<!-- Sign-out Confirmation Modal -->
<div id="logout_modal"
     class="hidden fixed inset-0 z-[9999] flex items-center justify-center"
     onclick="if(event.target===this) closeLogoutModal()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Card -->
    <div id="logout_modal_card"
         class="relative z-10 w-[360px] bg-gray-900/90 border border-white/10 rounded-2xl p-8
                shadow-[0_30px_80px_rgba(0,0,0,.7)]
                scale-95 opacity-0 transition-all duration-200 ease-out text-center">

        <!-- Icon -->
        <div class="w-16 h-16 rounded-full bg-red-500/15 flex items-center justify-center mx-auto mb-5">
            <i class="fa-solid fa-right-from-bracket text-red-400 text-2xl"></i>
        </div>

        <h3 class="text-xl font-bold text-white mb-2">Sign out?</h3>
        <p class="text-gray-400 text-sm mb-7 leading-relaxed">
            You'll be returned to the sign-in page.<br>Any unsaved changes will be lost.
        </p>

        <div class="flex gap-3">
            <button onclick="closeLogoutModal()"
                class="flex-1 py-2.5 rounded-xl bg-white/6 border border-white/10
                       text-gray-300 hover:bg-white/10 transition text-sm font-medium">
                Cancel
            </button>
            <button onclick="logout()"
                class="flex-1 py-2.5 rounded-xl bg-red-500/20 border border-red-500/30
                       text-red-400 hover:bg-red-500/30 transition text-sm font-semibold">
                <i class="fa-solid fa-power-off mr-1.5"></i> Sign Out
            </button>
        </div>
    </div>
</div>

</body>
</html>
