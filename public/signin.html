<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in | FormFlow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-teal: #031b1a;
            --obsidian: #0a0a0a;
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            background-color: var(--obsidian);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            /* Drastic Vertical Spacing Fix (8rem / 128px) */
            padding-top: 8rem;
            padding-bottom: 6rem;
        }

        /* ── Smooth Designer Background ── */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 50% 0%, var(--dark-teal) 0%, var(--obsidian) 80%);
        }

        /* ── Refined Grain Texture ── */
        .bg-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ── Glass Container ─────────────────────────────────────────────── */
        .glass-container {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 10;
        }

        /* ── Segmented Tabs ── */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-radius: 1.1rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .tab-btn {
            flex: 1;
            padding: 11px;
            border-radius: 0.85rem;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        /* ── Inputs ── */
        .input-group { margin-bottom: 1.5rem; }
        .input-label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
            margin-left: 4px;
        }
        .field {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.85rem;
            padding: 16px 20px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .field:focus {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .field::placeholder { color: rgba(255, 255, 255, 0.12); }

        /* ── High-Contrast Action Button ── */
        .btn-action {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        .btn-action:active { transform: translateY(0); }

        /* ── Brand Header ── */
        .brand-header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .batch-row { overflow: hidden; transition: all 0.4s; max-height: 0; opacity: 0; }
        .batch-row.visible { max-height: 120px; opacity: 1; margin-bottom: 1.5rem; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 14px 28px;
            border-radius: 12px;
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.5s;
        }
        @keyframes slideIn { from { top: -40px; opacity: 0; } to { top: 40px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="bg-grain"></div>

    <div class="flex flex-col items-center w-full px-8">
        <!-- Optimized Header -->
        <div class="brand-header">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-zinc-900 rounded-2xl mb-6 border border-white/10 shadow-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 8L3 12L7 16M17 8L21 12L17 16M14 4L10 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter mb-3 text-white uppercase flex items-center justify-center gap-2">
                Form<span class="text-emerald-400">Flow</span>
            </h1>
            <p class="text-white/30 text-[10px] font-black tracking-[0.3em] uppercase max-w-xs mx-auto leading-relaxed">
                Effortless form creation and analytics for the modern campus.
            </p>
        </div>

        <!-- Glass container -->
        <div class="glass-container" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.1s; opacity: 0;">
            <div class="tabs" id="tabs-container">
                <div class="tab-btn active" id="login-tab" onclick="switchTab('login')">SIGN IN</div>
                <div class="tab-btn" id="signup-tab" onclick="switchTab('signup')">CREATE ACCOUNT</div>
            </div>

            <div id="form-content"></div>
        </div>

        <!-- Footer -->
        <div class="mt-24 text-center opacity-20" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0;">
            <p class="text-[9px] font-black tracking-[0.5em] uppercase">© MMXXIV • DESIGNED BY S. BASU</p>
        </div>
    </div>

    <script>
        let currentTab = 'login';

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('signup-tab').classList.toggle('active', tab === 'signup');
            renderForm();
        }

        function showToast(message) {
            const old = document.getElementById('toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function handleRoleChange(select) {
            const row = document.getElementById('batch-row');
            const label = document.getElementById('batch-label-text');
            const input = document.getElementById('batch');
            if (!row) return;

            if (select.value === 'student' || select.value === 'faculty') {
                row.classList.add('visible');
                label.textContent = select.value === 'student' ? 'Batch Year' : 'Joining Year';
                input.required = true;
            } else {
                row.classList.remove('visible');
                input.required = false;
            }
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.textContent = 'AUTHORIZING...';
            btn.style.opacity = '0.6';

            try {
                const fd = new FormData(form);
                const body = Object.fromEntries(fd.entries());
                const res = await fetch(type === 'login' ? '/auth/login' : '/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok) {
                    if (type === 'login') window.location.href = data.redirect || '/';
                    else {
                        showToast('ACCOUNT CREATED');
                        setTimeout(() => switchTab('login'), 1200);
                    }
                } else {
                    showToast(data.message || data.error || 'ERROR');
                }
            } catch (err) {
                showToast('UNREACHABLE');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.opacity = '1';
            }
        }

        function renderForm() {
            const container = document.getElementById('form-content');
            if (currentTab === 'login') {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'login')">
                        <div class="input-group">
                            <label class="input-label">Username</label>
                            <input type="email" name="email" required placeholder="name@college.edu" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Password</label>
                            <input type="password" name="password" required placeholder="••••••••" class="field">
                        </div>
                        <button type="submit" class="btn-action">SIGN IN</button>
                    </form>
                `;
            } else {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'signup')">
                        <div class="input-group">
                            <label class="input-label">Identity</label>
                            <input type="text" name="name" required placeholder="Full Name" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Mail</label>
                            <input type="email" name="email" required placeholder="id@college.edu" class="field">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="input-label">Role</label>
                                <select name="user_type" required class="field" onchange="handleRoleChange(this)">
                                    <option value="" disabled selected>Role</option>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Dept</label>
                                <select name="department" required class="field">
                                    <option value="" disabled selected>Dept</option>
                                    <option value="CSE">CSE</option><option value="ECE">ECE</option><option value="ME">ME</option>
                                </select>
                            </div>
                        </div>
                        <div id="batch-row" class="batch-row">
                            <label class="input-label" id="batch-label-text">Year</label>
                            <input type="text" id="batch" name="batch" pattern="[0-9]{4}" maxlength="4" placeholder="2024" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Secret</label>
                            <input type="password" name="password" required placeholder="Min. 8 characters" class="field">
                        </div>
                        <button type="submit" class="btn-action">CREATE ACCOUNT</button>
                    </form>
                `;
            }
        }
        renderForm();
    </script>
</body>
</html>
