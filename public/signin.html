<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

        * { font-family: 'DM Sans', sans-serif; }

        .glass-box {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(18px);
            padding: 3.5rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,.12);
            box-shadow: 0 30px 80px rgba(0,0,0,.6);
            width: 100%;
            max-width: 460px;
        }

        /* ── Toast notification ── */
        .toast {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            animation: slideDown .3s cubic-bezier(.22,1,.36,1);
            border: 1px solid transparent;
        }
        .toast.error {
            background: rgba(239,68,68,.12);
            border-color: rgba(239,68,68,.3);
            color: #fca5a5;
        }
        .toast.success {
            background: rgba(16,185,129,.12);
            border-color: rgba(16,185,129,.3);
            color: #6ee7b7;
        }
        .toast-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .toast-body {}
        .toast-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .toast-msg {
            font-size: 13px;
            opacity: .8;
            line-height: 1.4;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Inputs ── */
        .field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            appearance: none;
            -webkit-appearance: none;
        }
        .field:focus {
            border-color: #34d399;
            box-shadow: 0 0 0 3px rgba(52,211,153,.15);
        }
        .field::placeholder { color: rgba(255,255,255,.35); }
        .field option { background: #1f2937; color: #fff; }

        /* Batch row animation */
        .batch-row {
            overflow: hidden;
            transition: max-height .35s cubic-bezier(.22,1,.36,1), opacity .3s;
            max-height: 0;
            opacity: 0;
        }
        .batch-row.visible {
            max-height: 80px;
            opacity: 1;
        }

        /* ── Button ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: .01em;
            border: none;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            box-shadow: 0 4px 20px rgba(16,185,129,.3);
        }
        .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        /* label tag above batch field */
        .batch-label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,.45);
            margin-bottom: 6px;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#020617] to-[#031b1a] min-h-screen flex items-center justify-center p-4">

    <div class="glass-box" id="app"></div>

    <script>
        // ── Show a toast inside #app ──────────────────────────────────────
        function showToast(type, title, message) {
            const old = document.getElementById('toast');
            if (old) old.remove();

            const icons = { error: '⚠️', success: '✅', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || '⚠️'}</span>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    <div class="toast-msg">${message}</div>
                </div>
            `;
            const app = document.getElementById('app');
            app.insertBefore(toast, app.firstChild);
        }

        // ── Toggle batch field based on role ─────────────────────────────
        function handleRoleChange(select) {
            select.classList.remove('text-gray-400');
            select.classList.add('text-white');

            const row   = document.getElementById('batch-row');
            const label = document.getElementById('batch-label-text');
            const input = document.getElementById('batch');

            if (!row) return;

            if (select.value === 'student') {
                row.classList.add('visible');
                label.textContent = 'Batch Year (e.g. 2024)';
                input.placeholder = 'e.g. 2024';
                input.required = true;
            } else if (select.value === 'faculty') {
                row.classList.add('visible');
                label.textContent = 'Joining Year (e.g. 2018)';
                input.placeholder = 'e.g. 2018';
                input.required = true;
            } else {
                row.classList.remove('visible');
                input.required = false;
            }
        }

        // ── Friendly error messages from server codes ────────────────────
        const ERROR_MAP = {
            'invalid_credentials': ['Invalid credentials',   'Email or password is incorrect. Please try again.'],
            'account_not_found':   ['Account not found',     'No account exists with that email address.'],
            'wrong_password':      ['Wrong password',        'The password you entered is incorrect.'],
            'too_many_attempts':   ['Too many attempts',     'Please wait a moment before trying again.'],
            'email_taken':         ['Email already in use',  'An account with this email already exists.'],
            'weak_password':       ['Weak password',         'Please choose a stronger password (min 6 chars).'],
        };

        function friendlyError(serverMessage) {
            // Try matching against known codes first
            if (ERROR_MAP[serverMessage]) return ERROR_MAP[serverMessage];
            // Fall back to whatever the server sent, cleaned up
            return ['Something went wrong', serverMessage || 'Please check your details and try again.'];
        }

        // ── Set button loading state ──────────────────────────────────────
        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.style.opacity = loading ? '0.7' : '1';
            btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
        }

        // ── Login via fetch ───────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const btn  = form.querySelector('button[type=submit]');
            btn.dataset.label = btn.textContent;

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Client-side pre-checks
            if (!email.includes('@')) {
                showToast('error', 'Invalid email', 'Please enter a valid email address.');
                return;
            }

            setLoading(btn, true);
            try {
                const res  = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    // Success — redirect wherever your backend says, or to '/'
                    window.location.href = data.redirect || '/';
                } else {
                    const [title, msg] = friendlyError(data.message || data.error);
                    showToast('error', title, msg);
                }
            } catch (err) {
                showToast('error', 'Connection error', 'Could not reach the server. Please try again.');
            } finally {
                setLoading(btn, false);
            }
        }

        // ── Signup via fetch ──────────────────────────────────────────────
        async function handleSignup(e) {
            e.preventDefault();
            const form = e.target;
            const btn  = form.querySelector('button[type=submit]');
            btn.dataset.label = btn.textContent;

            // Use FormData — form.name clashes with the native DOM property
            const fd = new FormData(form);
            const body = {
                name:       fd.get('name')?.trim(),
                email:      fd.get('email')?.trim(),
                user_type:  fd.get('user_type'),
                department: fd.get('department'),
                batch:      fd.get('batch'),
                password:   fd.get('password'),
            };

            setLoading(btn, true);
            try {
                const res  = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok) {
                    showToast('success', 'Account created!', 'Redirecting you to sign in…');
                    setTimeout(() => load('login'), 1500);
                } else {
                    const [title, msg] = friendlyError(data.message || data.error);
                    showToast('error', title, msg);
                }
            } catch (err) {
                showToast('error', 'Connection error', 'Could not reach the server. Please try again.');
            } finally {
                setLoading(btn, false);
            }
        }

        // ── Pages ─────────────────────────────────────────────────────────
        function load(page) {
            const app = document.getElementById('app');

            if (page === 'signup') {
                app.innerHTML = `
                    <h1 class="text-2xl font-semibold text-center text-emerald-400 mb-6">Create Account</h1>

                    <form class="space-y-3" onsubmit="handleSignup(event)">

                        <input type="text" name="name" placeholder="Full name" required class="field"/>

                        <input type="email" name="email" placeholder="Email address" required class="field"/>

                        <select name="user_type" id="user_type" required class="field text-gray-400"
                                onchange="handleRoleChange(this)">
                            <option value="" disabled selected>Select your role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                        </select>

                        <select name="department" required class="field text-gray-400"
                                onchange="this.classList.remove('text-gray-400'); this.classList.add('text-white')">
                            <option value="" disabled selected>Select department</option>
                            <option value="CSE">Computer Science</option>
                            <option value="ECE">Electronics</option>
                            <option value="EEE">Electrical</option>
                            <option value="MECH">Mechanical</option>
                            <option value="CIVIL">Civil</option>
                            <option value="IT">Information Technology</option>
                        </select>

                        <!-- Batch row — hidden until role is chosen -->
                        <div id="batch-row" class="batch-row">
                            <label class="batch-label" id="batch-label-text">Batch year</label>
                            <input type="text" id="batch" name="batch"
                                   placeholder="e.g. 2024"
                                   pattern="[0-9]{4}" maxlength="4" inputmode="numeric"
                                   class="field"/>
                        </div>

                        <input type="password" name="password" placeholder="Password" required class="field"/>

                        <div class="pt-1">
                            <button type="submit" class="btn-primary">Create Account</button>
                        </div>
                    </form>

                    <p class="text-center text-gray-500 mt-5 text-sm">
                        Already have an account?
                        <a class="text-emerald-400 hover:underline cursor-pointer font-medium" onclick="load('login')">Sign in</a>
                    </p>
                `;
            }

            if (page === 'login') {
                app.innerHTML = `
                    <h1 class="text-2xl font-semibold text-center text-emerald-400 mb-6">Sign In</h1>

                    <form class="space-y-3" onsubmit="handleLogin(event)">

                        <input type="email" name="email" id="email" placeholder="Email address" required class="field"/>

                        <input type="password" name="password" id="password" placeholder="Password" required class="field"/>

                        <div class="pt-1">
                            <button type="submit" class="btn-primary">Sign In</button>
                        </div>
                    </form>

                    <p class="text-center text-gray-500 mt-5 text-sm">
                        New here?
                        <a class="text-emerald-400 hover:underline cursor-pointer font-medium" onclick="load('signup')">Create account</a>
                    </p>
                `;


            }
        }

        load('login');
    </script>
</body>
</html>
