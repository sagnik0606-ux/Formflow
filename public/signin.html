<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in | FormFlow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --emerald-glow: rgba(16, 185, 129, 0.15);
            --slate-glow: rgba(59, 130, 246, 0.1);
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ── Dynamic Background Orbs ── */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: move 30s infinite alternate ease-in-out;
        }
        .orb-1 {
            background: radial-gradient(circle, #10b981 0%, transparent 70%);
            top: -20%;
            left: -10%;
        }
        .orb-2 {
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -7s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 80px) scale(1.15); }
        }

        /* ── Glass Container ── */
        .glass-container {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 10;
        }

        /* ── Segmented Control (Tabs) ── */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            padding: 5px;
            border-radius: 1.25rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 1rem;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ── Inputs ── */
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
            margin-left: 6px;
        }
        .field {
            width: 100%;
            background: rgba(255, 255, 255, 0.035);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 16px 20px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }
        .field:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #10b981;
            box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.12);
            transform: translateY(-1px);
        }
        .field::placeholder { color: rgba(255, 255, 255, 0.15); }
        .field select { background: transparent; }
        option { background: #111; color: #fff; }

        /* ── Primary Button ── */
        .btn-action {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 1.25rem;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }
        .btn-action:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
        }
        .btn-action:active { transform: translateY(-1px) scale(1); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .toast.error { background: rgba(239, 68, 68, 0.95); backdrop-filter: blur(12px); color: #fff; }
        .toast.success { background: rgba(16, 185, 129, 0.95); backdrop-filter: blur(12px); color: #fff; }

        @keyframes slideIn {
            from { transform: translate(-50%, -40px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* ── Animations ── */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .batch-row {
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
        }
        .batch-row.visible {
            max-height: 120px;
            opacity: 1;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="bg-[#080808]">

    <!-- Background Decoration -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="flex flex-col items-center w-full max-w-md px-6">
        <!-- Logo & Header -->
        <div class="text-center mb-10 fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-[1.25rem] mb-6 shadow-2xl shadow-emerald-900/30">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 8L3 12L7 16M17 8L21 12L17 16M14 4L10 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-5xl font-black tracking-tighter mb-3 uppercase flex items-center justify-center gap-2">
                Form<span class="text-emerald-400">Flow</span>
            </h1>
            <p class="text-white/40 text-sm font-semibold tracking-wide">Campus essentials collected in minutes.</p>
        </div>

        <!-- Main Card -->
        <div class="glass-container fade-in" style="animation-delay: 0.1s;">
            <div class="tabs" id="tabs-container">
                <div class="tab-btn active" id="login-tab" onclick="switchTab('login')">Sign In</div>
                <div class="tab-btn" id="signup-tab" onclick="switchTab('signup')">Create Account</div>
            </div>

            <div id="form-content">
                <!-- Content injected here -->
            </div>
        </div>

        <div class="mt-12 text-center fade-in" style="animation-delay: 0.2s;">
            <p class="text-white/20 text-[10px] font-black tracking-[0.3em] uppercase mb-1">
                A Sagnik Basu Production
            </p>
            <div class="h-[1px] w-8 bg-white/10 mx-auto"></div>
        </div>
    </div>

    <script>
        // ── Navigation State ──
        let currentTab = 'login';

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('signup-tab').classList.toggle('active', tab === 'signup');
            
            // Smooth transition for content
            const content = document.getElementById('form-content');
            content.style.opacity = '0';
            content.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                renderForm();
                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
            }, 200);
        }

        // ── Toast System ──
        function showToast(type, message) {
            const old = document.getElementById('toast');
            if (old) old.remove();

            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="text-xl">${type === 'error' ? '✕' : '✓'}</span>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // ── Role Logic ──
        function handleRoleChange(select) {
            const row = document.getElementById('batch-row');
            const label = document.getElementById('batch-label-text');
            const input = document.getElementById('batch');

            if (!row) return;

            if (select.value === 'student') {
                row.classList.add('visible');
                label.textContent = 'Batch Year';
                input.placeholder = 'e.g. 2024';
                input.required = true;
            } else if (select.value === 'faculty') {
                row.classList.add('visible');
                label.textContent = 'Joining Year';
                input.placeholder = 'e.g. 2018';
                input.required = true;
            } else {
                row.classList.remove('visible');
                input.required = false;
            }
        }

        // ── Auth Logic ──
        async function handleAuth(e, type) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.6';

            const fd = new FormData(form);
            const body = Object.fromEntries(fd.entries());

            try {
                const url = type === 'login' ? '/auth/login' : '/auth/signup';
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok) {
                    if (type === 'login') {
                        window.location.href = data.redirect || '/';
                    } else {
                        showToast('success', 'Account created! Switching to login...');
                        setTimeout(() => switchTab('login'), 1500);
                    }
                } else {
                    showToast('error', data.message || data.error || 'Authorization failed');
                }
            } catch (err) {
                showToast('error', 'Unable to reach the server.');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.opacity = '1';
            }
        }

        // ── Render Logic ──
        function renderForm() {
            const container = document.getElementById('form-content');
            container.style.transition = 'all 0.4s ease';
            
            if (currentTab === 'login') {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'login')">
                        <div class="input-group">
                            <label class="input-label">Username / Email</label>
                            <input type="email" name="email" required placeholder="your.name@college.edu" class="field" autocomplete="email">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Password</label>
                            <input type="password" name="password" required placeholder="••••••••" class="field" autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn-action">Sign In</button>
                    </form>
                `;
            } else {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'signup')">
                        <div class="input-group">
                            <label class="input-label">Full Name</label>
                            <input type="text" name="name" required placeholder="John Doe" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">College Email</label>
                            <input type="email" name="email" required placeholder="college-id@edu.com" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Role</label>
                            <select name="user_type" required class="field" onchange="handleRoleChange(this)">
                                <option value="" disabled selected>Select Role</option>
                                <option value="student">Student</option>
                                <option value="faculty">Faculty</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Department</label>
                            <select name="department" required class="field">
                                <option value="" disabled selected>Select Department</option>
                                <option value="CSE">Computer Science</option>
                                <option value="ECE">Electronics</option>
                                <option value="EEE">Electrical</option>
                                <option value="MECH">Mechanical</option>
                                <option value="CIVIL">Civil</option>
                                <option value="IT">Information Technology</option>
                            </select>
                        </div>
                        <div id="batch-row" class="batch-row">
                            <label class="input-label" id="batch-label-text">Year</label>
                            <input type="text" id="batch" name="batch" pattern="[0-9]{4}" maxlength="4" placeholder="2024" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Set Password</label>
                            <input type="password" name="password" required placeholder="Min. 8 characters" class="field" autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn-action">Create Account</button>
                    </form>
                `;
            }
        }

        // Initialize
        renderForm();
    </script>
</body>
</html>
