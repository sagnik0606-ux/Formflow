<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Dashboard</title>
    <style>
        body { overflow: hidden; }

        /* ── Sidebar ── */
        .nav-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(255,255,255,.06);
            text-align: left;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: .25s ease;
        }
        .nav-btn i { width: 20px; text-align: center; }
        .nav-btn:hover  { background: rgba(16,185,129,.25); transform: translateX(6px); }
        .nav-btn.active { background: rgba(16,185,129,.35); transform: translateX(6px); }

        /* ── Hero banner ── */
        .hero-banner {
            position: relative;
            overflow: hidden;
            border-radius: 1.75rem;
            background: linear-gradient(135deg, #0d4f3c 0%, #0a3d4a 60%, #062a36 100%);
            border: 1px solid rgba(255,255,255,.08);
            padding: 3rem 3.5rem;
        }
        .hero-banner .orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(70px);
            pointer-events: none;
        }
        .hero-banner .orb-1 {
            width: 380px; height: 380px;
            background: rgba(16,185,129,.22);
            top: -120px; right: -80px;
        }
        .hero-banner .orb-2 {
            width: 200px; height: 200px;
            background: rgba(6,182,212,.14);
            bottom: -60px; left: 20px;
        }
        .dot-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,.18) 1.5px, transparent 1.5px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        /* ── Stat cards ── */
        .stat-card {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 1.25rem;
            padding: 1.75rem 2rem;
            flex: 1;
            transition: border-color .2s, transform .2s;
        }
        .stat-card:hover {
            border-color: rgba(52,211,153,.3);
            transform: translateY(-2px);
        }

        /* ── Buttons ── */
        .quick-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: .85rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: .95rem;
            box-shadow: 0 4px 20px rgba(16,185,129,.35);
            transition: .25s ease;
            color: #fff;
            cursor: pointer;
            border: none;
        }
        .quick-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(16,185,129,.45); }
        .quick-btn.secondary {
            background: transparent;
            border: 1.5px solid rgba(52,211,153,.5);
            color: #34d399;
            box-shadow: none;
        }
        .quick-btn.secondary:hover { background: rgba(16,185,129,.1); box-shadow: none; }

        /* ── Scroll ── */
        #work_area { overflow-y: auto; height: 100vh; }
        #work_area::-webkit-scrollbar { width: 6px; }
        #work_area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        input[type="datetime-local"] {
            background: #1f2937;
            border: 1px solid #374151;
            color-scheme: dark;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .fu  { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
        .fu2 { animation: fadeUp .45s .1s cubic-bezier(.22,1,.36,1) both; }
        .fu3 { animation: fadeUp .45s .18s cubic-bezier(.22,1,.36,1) both; }
    </style>
</head>

<body class="min-h-screen text-white">
    <div class="fixed inset-0 bg-gradient-to-br from-[#020617] to-[#031b1a]"></div>

    <div class="relative min-h-screen flex">

        <!-- ── Sidebar ── -->
        <aside class="w-72 p-6 backdrop-blur-xl bg-white/5 border-r border-white/10 select-none flex-shrink-0 min-h-screen flex flex-col">

            <h2 class="text-2xl font-bold text-emerald-400 mb-10 cursor-pointer"
                onclick="setActive(this); loadUser()">FormFlow</h2>

            <nav class="space-y-4">
                <button onclick="setActive(this); goCreateForm()" class="nav-btn">
                    <i class="fa-solid fa-plus"></i> New Form
                </button>
                <button onclick="setActive(this); goMyForms()" class="nav-btn">
                    <i class="fa-solid fa-file"></i> My Forms
                </button>
                <button onclick="setActive(this); goMyResponses()" class="nav-btn">
                    <i class="fa-solid fa-chart-bar"></i> My Responses
                </button>
                <button onclick="setActive(this); goFillForm()" class="nav-btn">
                    <i class="fa-solid fa-pen-to-square"></i> Fill Form
                </button>
            </nav>

            <div class="mt-auto text-xs text-gray-600">v1.0 &bull; FormFlow</div>
        </aside>

        <!-- ── Main ── -->
        <main class="flex-1 p-10 flex flex-col gap-6 items-start justify-start" id="work_area"></main>

    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const userId = params.get("user_id");
        const work_area = document.getElementById("work_area");

        function setActive(btn) {
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            if (btn.classList.contains("nav-btn")) btn.classList.add("active");
        }

        function timeGreeting() {
            const h = new Date().getHours();
            if (h < 12) return "Good morning";
            if (h < 17) return "Good afternoon";
            return "Good evening";
        }

        async function loadUser() {
            let name = "there";
            try {
                const res  = await fetch(`/auth/user/${userId}`);
                const data = await res.json();
                name = data.NAME || name;
            } catch (_) {}

            work_area.innerHTML = `

                <!-- Hero banner -->
                <div class="hero-banner w-full fu">
                    <div class="dot-grid"></div>
                    <div class="orb orb-1"></div>
                    <div class="orb orb-2"></div>
                    <div class="relative z-10">
                        <h1 class="text-5xl font-bold mb-3 leading-tight">
                            Welcome, <span class="bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">${name} 👋</span>
                        </h1>
                        <p class="text-gray-300 text-base mb-8 max-w-lg">
                            Manage your forms, collect responses, and analyze data — all in one place.
                        </p>
                        <div class="flex gap-4 flex-wrap">
                            <button onclick="goCreateForm()" class="quick-btn">
                                <i class="fa-solid fa-plus mr-2"></i>Create Form
                            </button>
                            <button onclick="goFillForm()" class="quick-btn secondary">
                                <i class="fa-solid fa-pen-to-square mr-2"></i>Fill Form
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Stat cards -->
                <div class="flex gap-5 w-full fu2">

                    <div class="stat-card">
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Total Forms</p>
                        <p class="text-4xl font-bold text-white" id="stat-forms">--</p>
                        <p class="text-xs text-emerald-400 mt-2">forms created</p>
                    </div>

                    <div class="stat-card">
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Responses</p>
                        <p class="text-4xl font-bold text-white" id="stat-responses">--</p>
                        <p class="text-xs text-emerald-400 mt-2">forms submitted by you</p>
                    </div>

                    <div class="stat-card">
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Active Forms</p>
                        <p class="text-4xl font-bold text-white" id="stat-active">--</p>
                        <p class="text-xs text-emerald-400 mt-2">currently active</p>
                    </div>

                </div>
            `;

            // Wire up stats from real endpoints
            try {
                const [formsRes, responsesRes] = await Promise.all([
                    fetch(`/forms/myforms?user_id=${userId}`),
                    fetch(`/responses/my/${userId}`)
                ]);
                const formsData     = await formsRes.json();
                const responsesData = await responsesRes.json();
                if (Array.isArray(formsData)) {
                    document.getElementById("stat-forms").textContent  = formsData.length;
                    document.getElementById("stat-active").textContent = formsData.filter(f => f.STATUS === "open").length;
                }
                if (Array.isArray(responsesData)) {
                    document.getElementById("stat-responses").textContent = responsesData.length;
                }
            } catch (_) {}
        }

        loadUser();
    </script>

    <script src="newForm.js" defer></script>
    <script src="myForms.js" defer></script>
    <script src="myResponses.js" defer></script>
    <script src="fillForm.js" defer></script>
</body>
</html>
